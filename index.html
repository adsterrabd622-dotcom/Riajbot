<body>
    <div class="tiffany-bg"></div>
    
    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        
        // ========== CONFIG ==========
        const ADMIN_ID = "admin_username"; // Change this
        const ADS_KEY = "tiffany_ads";
        const WELCOME_KEY = "tiffany_welcome";
        
        // ========== DATA ==========
        let ads = { inter: 0, pop: 0, total: 0, date: '' };
        
        const MAX_ADS = 60;
        const CIRCUMFERENCE = 377; // 2 * π * 60
        
        // ========== GET TELEGRAM USER - This shows the username ==========
        const user = Telegram.WebApp.initDataUnsafe.user;
        let displayName = "User";
        let username = "";
        let fullName = "Premium Member";
        
        console.log("Telegram User Data:", user); // Debug: দেখুন ইউজার ডাটা আসছে কিনা
        
        if (user) {
            // যদি username থাকে তাহলে @username দেখাবে
            if (user.username) {
                displayName = "@" + user.username;
                username = user.username;
                fullName = user.first_name || "Premium Member";
                if (user.last_name) {
                    fullName += " " + user.last_name;
                }
            } 
            // যদি username না থাকে তাহলে first name দেখাবে
            else if (user.first_name) {
                displayName = user.first_name;
                fullName = user.first_name;
                if (user.last_name) {
                    displayName += " " + user.last_name;
                    fullName += " " + user.last_name;
                }
            }
        }
        
        console.log("Display Name:", displayName); // Debug: কোন নাম দেখাচ্ছে
        
        // ========== LOAD ADS ==========
        function loadData() {
            const today = new Date();
            const todayStr = today.toDateString();
            
            const adsData = localStorage.getItem(ADS_KEY);
            
            if (adsData) {
                try {
                    const data = JSON.parse(adsData);
                    if (data.date === todayStr) {
                        ads = data;
                    } else {
                        ads = { inter: 0, pop: 0, total: 0, date: todayStr };
                    }
                } catch (e) {
                    ads = { inter: 0, pop: 0, total: 0, date: todayStr };
                }
            } else {
                ads = { inter: 0, pop: 0, total: 0, date: todayStr };
            }
            
            saveAds();
            updateUI();
        }
        
        function saveAds() {
            localStorage.setItem(ADS_KEY, JSON.stringify(ads));
        }
        
        // ========== UPDATE UI ==========
        function updateUI() {
            // Stats
            document.getElementById('interValue').textContent = ads.inter;
            document.getElementById('popValue').textContent = ads.pop;
            
            // Ring
            const ringProgress = (ads.total / MAX_ADS) * 100;
            const offset = CIRCUMFERENCE - (CIRCUMFERENCE * ringProgress / 100);
            document.getElementById('progressRing').style.strokeDashoffset = offset;
            document.getElementById('ringNumber').textContent = ads.total;
            
            // Badges
            document.getElementById('interBadge').textContent = 55 - ads.inter;
            document.getElementById('popBadge').textContent = 5 - ads.pop;
            
            // Buttons
            document.getElementById('interBtn').disabled = ads.inter >= 55 || ads.total >= MAX_ADS;
            document.getElementById('popBtn').disabled = ads.pop >= 5 || ads.total >= MAX_ADS || ads.inter < 55;
            
            // Check if limit reached
            if (ads.total >= MAX_ADS) {
                document.getElementById('limitModal').classList.add('show');
            }
        }
        
        // ========== ADS FUNCTIONS ==========
        function checkSDK() {
            return typeof show_10734218 === 'function';
        }
        
        function showInterstitial() {
            if (ads.inter >= 55) {
                alert('✨ USE POPUP BUTTON NOW!');
                return;
            }
            
            if (ads.total >= MAX_ADS) {
                document.getElementById('limitModal').classList.add('show');
                return;
            }
            
            if (!checkSDK()) {
                alert('⏳ LOADING ADS...');
                return;
            }
            
            document.getElementById('loading').classList.remove('hidden');
            
            show_10734218()
                .then(() => {
                    ads.inter++;
                    ads.total++;
                    saveAds();
                    updateUI();
                    document.getElementById('loading').classList.add('hidden');
                    Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                    
                    if (ads.inter === 55) {
                        alert('🎉 55 DONE! NOW USE POPUP');
                    }
                    
                    if (ads.total >= MAX_ADS) {
                        document.getElementById('limitModal').classList.add('show');
                    }
                })
                .catch(() => {
                    document.getElementById('loading').classList.add('hidden');
                    Telegram.WebApp.HapticFeedback.notificationOccurred('error');
                });
        }
        
        function showPopup() {
            if (ads.inter < 55) {
                alert(`⏳ NEED ${55 - ads.inter} MORE INTERSTITIAL`);
                return;
            }
            
            if (ads.pop >= 5) {
                alert('✅ ALL POPUP COMPLETED!');
                return;
            }
            
            if (ads.total >= MAX_ADS) {
                document.getElementById('limitModal').classList.add('show');
                return;
            }
            
            if (!checkSDK()) {
                alert('⏳ LOADING ADS...');
                return;
            }
            
            document.getElementById('loading').classList.remove('hidden');
            
            show_10734218('pop')
                .then(() => {
                    ads.pop++;
                    ads.total++;
                    saveAds();
                    updateUI();
                    document.getElementById('loading').classList.add('hidden');
                    Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                    
                    if (ads.total >= MAX_ADS) {
                        document.getElementById('limitModal').classList.add('show');
                    }
                })
                .catch(() => {
                    document.getElementById('loading').classList.add('hidden');
                    Telegram.WebApp.HapticFeedback.notificationOccurred('error');
                });
        }
        
        // ========== RESET ==========
        function resetCounter() {
            ads = { inter: 0, pop: 0, total: 0, date: new Date().toDateString() };
            saveAds();
            updateUI();
            document.getElementById('limitModal').classList.remove('show');
            Telegram.WebApp.HapticFeedback.notificationOccurred('success');
            
            localStorage.removeItem(WELCOME_KEY);
            setTimeout(showWelcomeModal, 500);
        }
        
        // ========== WELCOME ==========
        function showWelcomeModal() {
            document.getElementById('welcomeName').innerHTML = displayName + ' <i class="fas fa-gem"></i>';
            document.getElementById('welcomeModal').classList.add('show');
        }
        
        function closeWelcome() {
            document.getElementById('welcomeModal').classList.remove('show');
        }
        
        function checkWelcome() {
            if (!localStorage.getItem(WELCOME_KEY)) {
                setTimeout(showWelcomeModal, 500);
                localStorage.setItem(WELCOME_KEY, 'true');
            }
        }
        
        // ========== CONTACT ADMIN ==========
        function contactAdmin() {
            let msg = "Hello Admin, I need help!";
            if (username) {
                msg = `Hello Admin, I'm @${username} and I need help.`;
            }
            window.open(`https://t.me/${ADMIN_ID}?text=${encodeURIComponent(msg)}`, '_blank');
        }
        
        function closeLimitModal() {
            document.getElementById('limitModal').classList.remove('show');
        }
        
        // ========== INIT ==========
        window.onload = () => {
            loadData();
            
            // Set user info in profile - এই লাইনে ইউজারের নাম দেখানো হচ্ছে
            document.getElementById('userName').innerHTML = displayName + ' <span class="tiffany-tick"><i class="fas fa-gem"></i></span>';
            document.getElementById('userStatus').textContent = fullName + ' • VIP MEMBER ';
            
            // Set welcome modal name
            document.getElementById('welcomeName').innerHTML = displayName + ' <i class="fas fa-gem"></i>';
            
            checkWelcome();
        };
    </script>

            <div class="user-row">

                <div class="user-text">
                    <!-- এই h4 ট্যাগে টেলিগ্রাম নাম দেখাবে -->
                    <h4 id="userName">User <span class="tiffany-tick"><i class="fas fa-gem"></i></span></h4>

            </div>
            
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-icon">
                        <i class="fas fa-bolt"></i>
                    </div>
                    <div class="stat-number" id="interValue">0</div>
                    <div class="stat-label">INTER</div>
                </div>
                <div class="stat-item">
                    <div class="stat-icon">
                        <i class="fas fa-window-maximize"></i>
                    </div>
                    <div class="stat-number" id="popValue">0</div>
                    <div class="stat-label">POPUP</div>
                </div>
            </div>
            
            <!-- Ring -->
            <div class="ring-wrapper">
                <svg class="progress-ring" viewBox="0 0 140 140">
                    <circle class="ring-bg" cx="70" cy="70" r="60"></circle>
                    <circle id="progressRing" class="ring-progress" cx="70" cy="70" r="60"
                            stroke-dasharray="377" stroke-dashoffset="377"></circle>
                </svg>
                <div class="ring-center">
                    <div class="ring-number" id="ringNumber">0</div>
                    <div class="ring-label">OF 60</div>
                </div>
            </div>
            
            <!-- Buttons -->
            <div class="action-buttons">
                <button id="interBtn" class="action-btn btn-primary" onclick="showInterstitial()">
                    <i class="fas fa-play"></i>
                    INTER
                    <span id="interBadge" class="btn-count">55</span>
                </button>
                <button id="popBtn" class="action-btn btn-secondary" onclick="showPopup()">
                    <i class="fas fa-window-maximize"></i>
                    POPUP
                    <span id="popBadge" class="btn-count">5</span>
                </button>
            </div>
            
            <!-- Loading -->
            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <span class="text-small">LOADING...</span>
            </div>
            
            <!-- Footer -->
            <div class="footer">
                <i class="fas fa-shield-alt"></i>
                <span>DEV.SAKIB</span>
                <i class="fas fa-shield-alt"></i>
            </div>
        </div>
    </div>
    
    <!-- Welcome Modal - এখানেও Telegram Name দেখাবে -->
    <div id="welcomeModal" class="welcome-modal">
        <div class="welcome-card">
            <div class="close-btn" onclick="closeWelcome()">
                <i class="fas fa-times"></i>
            </div>
            <div class="welcome-icon">
                <i class="fas fa-gem"></i>
            </div>
            <h2 class="welcome-title">WELCOME</h2>
            <!-- এই div-এ টেলিগ্রাম নাম দেখাবে -->
            <div class="welcome-name" id="welcomeName">User <i class="fas fa-gem"></i></div>
            <div class="features">
                <div class="feature"><i class="fas fa-bolt"></i> 55 INTERSTITIAL</div>
                <div class="feature"><i class="fas fa-window-maximize"></i> 5 POPUP</div>
                <div class="feature"><i class="fas fa-clock"></i>  RESET</div>
                <div class="feature"><i class="fas fa-gem"></i> DEV.SAKIB HOSSAIN</div>
            </div>
            <button class="welcome-btn" onclick="closeWelcome()">ENTER</button>
        </div>
    </div>
    
    <!-- Limit Modal - With Rules -->
    <div id="limitModal" class="limit-modal">
        <div class="limit-card">
            <div class="limit-icon">
                <i class="fas fa-hourglass-end"></i>
            </div>
            <h2 class="limit-title">LIMIT</h2>
            
            <div class="rules-box">
                <div class="rule-item">
                    <i class="fas fa-wifi-slash"></i>
                    <span><span class="rule-number">1.</span> IP OFF</span>
                </div>
                <div class="rule-item">
                    <i class="fab fa-google"></i>
                    <span><span class="rule-number">2.</span> RESET GOOGLE ADS</span>
                </div>
                <div class="rule-item">
                    <i class="fas fa-plane"></i>
                    <span><span class="rule-number">3.</span> AIRPLANE MODE ON 10s</span>
                </div>
                <div class="rule-item">
                    <i class="fas fa-rotate-right"></i>
                    <span><span class="rule-number">4.</span> RESET COUNTER</span>
                </div>
            </div>
            
            <p class="text-small" style="margin: 10px 0;">60/60 COMPLETED</p>
            
            <button class="limit-btn" onclick="resetCounter()">
                <i class="fas fa-rotate-right"></i> RESET
            </button>
        </div>
    </div>
    
    <script>
        window.showInterstitial = showInterstitial;
        window.showPopup = showPopup;
        window.resetCounter = resetCounter;
        window.closeWelcome = closeWelcome;
        window.closeLimitModal = closeLimitModal;
        window.contactAdmin = contactAdmin;
    </script>
</body>
</html>
